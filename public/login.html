<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hyderabad Startup Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="antialiased flex items-center justify-center min-h-screen hero-gradient p-4">

  <!-- Back button -->
  <a href="index.html" class="absolute top-8 left-8 text-white font-medium hover:text-white/80 transition-colors flex items-center gap-2">
    <i class="ph-bold ph-arrow-left"></i> Back to Portal
  </a>

  <div class="glass-panel w-full max-w-md rounded-3xl p-8 sm:p-12 shadow-2xl relative overflow-hidden animate-[fade-in-down_0.5s_ease-out_both] border border-white/20">
    <div class="absolute inset-0 bg-white/40 backdrop-blur-xl z-0"></div>
    
    <div class="relative z-10">
      <div class="flex justify-center mb-8">
        <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-lg transform rotate-3">
          <i class="ph-fill ph-rocket-launch text-indigo-600 text-4xl transform -rotate-3"></i>
        </div>
      </div>
      
      <h1 class="text-3xl font-bold text-gray-900 text-center mb-2" style="font-family: 'Outfit', sans-serif;">Welcome Back</h1>
      <p class="text-center text-gray-600 mb-8">Sign in to save favorites and submit your own startup.</p>

      <form action="#" onsubmit="event.preventDefault(); window.location.href='index.html';" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <i class="ph ph-envelope"></i>
            </div>
            <input type="email" required class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl bg-white/60 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors outline-none" placeholder="founder@startup.in">
          </div>
        </div>

        <div>
           <div class="flex items-center justify-between mb-1">
            <label class="block text-sm font-medium text-gray-700">Password</label>
            <a href="#" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800">Forgot password?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <i class="ph ph-lock-key"></i>
            </div>
            <input type="password" required class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl bg-white/60 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors outline-none" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors mt-8">
          Sign In
        </button>
      </form>

      <p class="mt-8 text-center text-sm text-gray-600">
        Don't have an account? 
        <a href="#" class="font-bold text-indigo-600 hover:text-indigo-800">Create one</a>
      </p>
    </div>
  </div>

</body>
</html>
