<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startups - Hyderabad Startup Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="antialiased text-gray-800 flex flex-col min-h-screen bg-gray-50">

  <!-- Navbar -->
  <header class="fixed w-full top-0 z-50 glass-panel border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <a href="index.html" class="flex items-center gap-2">
          <i class="ph-fill ph-rocket-launch text-indigo-600 text-3xl"></i>
          <span class="font-bold text-2xl tracking-tight text-gray-900" style="font-family: 'Outfit', sans-serif;">HydStartups.</span>
        </a>
        <nav class="hidden md:flex gap-8">
          <a href="index.html" class="text-gray-500 hover:text-indigo-600 font-medium transition-colors">Home</a>
          <a href="startups.html" class="text-indigo-600 font-medium">Startups</a>
          <a href="login.html" class="text-gray-500 hover:text-indigo-600 font-medium transition-colors">Login</a>
        </nav>
        <div class="flex items-center gap-4">
          <a href="add-startup.html" class="hidden md:flex items-center gap-2 bg-gray-900 text-white px-5 py-2.5 rounded-full font-medium hover:bg-gray-800 transition-colors">
            <i class="ph-bold ph-plus"></i> Add Startup
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow pt-32 pb-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <!-- Header -->
      <div class="mb-10 text-center max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold text-gray-900 mb-4">Discover Startups</h1>
        <p class="text-gray-500 text-lg">Browse through the most innovative companies in Hyderabad.</p>
      </div>

      <!-- Filters Section -->
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-10 flex flex-col md:flex-row gap-6 justify-between items-center">
        <!-- Search bar -->
        <div class="relative w-full md:w-1/2">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="ph ph-magnifying-glass text-gray-400 text-xl"></i>
          </div>
          <input type="text" id="searchInput" placeholder="Search by name, desc, or type 'AI'..." 
                 class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 transition-all outline-none">
        </div>

        <!-- Categories Filters -->
        <div class="flex flex-wrap items-center gap-2" id="categoryFilters">
          <button class="cat-btn active px-4 py-2 rounded-full border border-gray-200 text-sm font-medium transition-colors bg-gray-900 text-white" data-cat="All">All</button>
          <button class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium hover:border-indigo-500 transition-colors text-gray-600 bg-white" data-cat="AI">AI</button>
          <button class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium hover:border-indigo-500 transition-colors text-gray-600 bg-white" data-cat="SaaS">SaaS</button>
          <button class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium hover:border-indigo-500 transition-colors text-gray-600 bg-white" data-cat="FinTech">FinTech</button>
          <button class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium hover:border-indigo-500 transition-colors text-gray-600 bg-white" data-cat="DeepTech">DeepTech</button>
        </div>
      </div>

      <!-- Startups Grid -->
      <div id="startupsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Populated by JS -->
      </div>
      
      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center py-20">
        <i class="ph ph-magnifying-glass text-6xl text-gray-300 mb-4 inline-block"></i>
        <h3 class="text-xl font-bold text-gray-900 mb-2">No startups found</h3>
        <p class="text-gray-500">We couldn't find anything matching your search. Try adjusting the filters.</p>
        <button onclick="clearFilters()" class="mt-4 text-indigo-600 font-semibold hover:text-indigo-800">Clear filters</button>
      </div>

    </div>
  </main>

  <script>
    // Helper to provide nice category badge colors
    const getCategoryColor = (category) => {
      const colors = {
        DeepTech: 'bg-blue-100 text-blue-800 border-blue-200',
        SaaS: 'bg-green-100 text-green-800 border-green-200',
        FinTech: 'bg-yellow-100 text-yellow-800 border-yellow-200',
        AI: 'bg-purple-100 text-purple-800 border-purple-200',
        EdTech: 'bg-indigo-100 text-indigo-800 border-indigo-200'
      };
      return colors[category] || 'bg-gray-100 text-gray-800 border-gray-200';
    };

    let currentFilter = 'All';
    const searchInput = document.getElementById('searchInput');
    const startusGrid = document.getElementById('startupsGrid');
    const emptyState = document.getElementById('emptyState');
    const catBtns = document.querySelectorAll('.cat-btn');

    // Parse URL query parameter for search
    const urlParams = new URLSearchParams(window.location.search);
    const initialQuery = urlParams.get('q');
    if (initialQuery) {
      searchInput.value = initialQuery;
    }

    const clearFilters = () => {
      searchInput.value = '';
      setCategory('All');
      renderGrid();
    };

    const setCategory = (cat) => {
      currentFilter = cat;
      catBtns.forEach(b => {
        if(b.dataset.cat === cat) {
          b.classList.add('bg-gray-900', 'text-white', 'border-gray-900');
          b.classList.remove('text-gray-600', 'bg-white');
        } else {
          b.classList.remove('bg-gray-900', 'text-white', 'border-gray-900');
          b.classList.add('text-gray-600', 'bg-white');
        }
      });
    };

    const toggleSave = (e, id) => {
      e.preventDefault(); // prevent navigation
      const btn = e.currentTarget;
      btn.querySelector('i').classList.toggle('ph-fill');
      btn.querySelector('i').classList.toggle('text-red-500');
      btn.classList.toggle('saved');
    };

    const renderGrid = async () => {
      try {
        const query = searchInput.value.trim();
        const urlParams = new URLSearchParams();
        if(currentFilter !== 'All') urlParams.append('category', currentFilter);
        if(query) urlParams.append('search', query);

        const response = await fetch('/api/startups?' + urlParams.toString());
        const filtered = await response.json();

        if(filtered.length === 0) {
          startusGrid.classList.add('hidden');
          emptyState.classList.remove('hidden');
        } else {
          startusGrid.classList.remove('hidden');
          emptyState.classList.add('hidden');
          
          startusGrid.innerHTML = filtered.map(startup => `
          <a href="startup-detail.html?id=${startup.id}" class="group block h-full">
            <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden hover-lift h-full flex flex-col relative group-hover:border-indigo-100 transition-colors">
              <button class="absolute top-4 right-4 z-10 w-10 h-10 rounded-full bg-white/80 backdrop-blur shadow hover:bg-white flex items-center justify-center text-gray-400 hover:text-red-500 transition-all heart" onclick="toggleSave(event, ${startup.id})">
                <i class="ph-bold ph-heart text-xl"></i>
              </button>

              <div class="h-48 overflow-hidden relative">
                <img src="${startup.cover}" alt="${startup.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-gray-900/60 to-transparent"></div>
              </div>
              
              <div class="p-6 flex-grow flex flex-col pt-0 relative">
                <div class="w-16 h-16 rounded-xl overflow-hidden -mt-8 border-4 border-white bg-white shadow-md mb-4 z-10">
                  <img src="${startup.logo}" alt="${startup.name} logo" class="w-full h-full object-cover">
                </div>

                <div class="flex items-center gap-2 mb-2">
                  <span class="inline-flex shrink-0 px-2.5 py-0.5 rounded-md text-xs font-semibold border ${getCategoryColor(startup.category)}">
                    ${startup.category}
                  </span>
                  <h3 class="text-xl font-bold text-gray-900 group-hover:text-indigo-600 transition-colors truncate">${startup.name}</h3>
                </div>
                
                <p class="text-gray-500 text-sm leading-relaxed flex-grow line-clamp-2">
                  ${startup.shortDesc}
                </p>
                
                <div class="mt-6 pt-4 border-t border-gray-100 flex items-center justify-between text-sm text-gray-600">
                  <span class="flex items-center gap-1"><i class="ph ph-user"></i> ${startup.founder}</span>
                </div>
              </div>
            </div>
          </a>
        `).join('');
        }
      } catch(err) {
        console.error(err);
      }
    };

    // Event Listeners
    searchInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') { renderGrid(); }
    });
    catBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        setCategory(btn.dataset.cat);
        renderGrid();
      });
    });

    // Initial render
    renderGrid();
  </script>
</body>
</html>
