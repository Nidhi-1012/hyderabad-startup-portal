<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Startup - Hyderabad Startup Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="antialiased text-gray-800 bg-gray-50 flex flex-col min-h-screen">

    <!-- Navbar -->
  <header class="w-full bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <a href="index.html" class="flex items-center gap-2">
          <i class="ph-fill ph-rocket-launch text-indigo-600 text-3xl"></i>
          <span class="font-bold text-2xl tracking-tight text-gray-900" style="font-family: 'Outfit', sans-serif;">HydStartups.</span>
        </a>
        <a href="index.html" class="text-sm font-semibold text-gray-500 hover:text-indigo-600 transition-colors flex items-center gap-2">
           <i class="ph-bold ph-x"></i> Cancel
        </a>
      </div>
    </div>
  </header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl p-8 sm:p-12 shadow-sm border border-gray-100">
      
      <div class="mb-10 text-center">
        <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i class="ph-fill ph-rocket-launch text-indigo-600 text-3xl text-center inline-block"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900" style="font-family: 'Outfit', sans-serif;">Submit Your Startup</h1>
        <p class="text-gray-500 mt-2">Join the fastest-growing directory of tech companies in Hyderabad.</p>
      </div>

      <form id="addStartupForm" class="space-y-6">
        
        <!-- Basic Info -->
        <div class="space-y-4">
            <h3 class="text-lg font-bold text-gray-900 border-b border-gray-100 pb-2">Basic Info</h3>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Startup Name</label>
              <input type="text" id="s-name" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" placeholder="e.g. Neuraflow AI">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Founder(s)</label>
              <input type="text" id="s-founder" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" placeholder="Name of founders">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                  <select id="s-category" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all bg-white">
                    <option value="AI">Artificial Intelligence</option>
                    <option value="SaaS">SaaS / Enterprise</option>
                    <option value="FinTech">FinTech</option>
                    <option value="DeepTech">DeepTech</option>
                    <option value="EdTech">EdTech</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Website URL</label>
                  <input type="url" id="s-website" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" placeholder="https://">
                </div>
            </div>
        </div>

        <!-- Description -->
        <div class="space-y-4 pt-4">
            <h3 class="text-lg font-bold text-gray-900 border-b border-gray-100 pb-2">Details</h3>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Short Elevator Pitch (Max 100 chars)</label>
              <input type="text" maxlength="100" id="s-shortDesc" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" placeholder="A brief one-liner about your startup">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Full Description</label>
              <textarea rows="4" id="s-desc" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all resize-none" placeholder="Tell us more about what you are building, the problem you solve, and your vision..."></textarea>
            </div>
        </div>

        <div class="pt-6">
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-colors flex items-center justify-center gap-2">
            Submit Startup <i class="ph-bold ph-paper-plane-right"></i>
          </button>
        </div>

      </form>
    </div>
  </main>

  <footer class="bg-gray-50 py-8 border-t border-gray-200 text-center">
      <p class="text-sm text-gray-500">© 2026 Hyderabad Startup Portal. Submitted applications are manually reviewed.</p>
  </footer>

  <script>
    document.getElementById('addStartupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Submitting...`;
      btn.disabled = true;

      const newStartup = {
        name: document.getElementById('s-name').value,
        founder: document.getElementById('s-founder').value,
        category: document.getElementById('s-category').value,
        website: document.getElementById('s-website').value,
        shortDesc: document.getElementById('s-shortDesc').value,
        description: document.getElementById('s-desc').value
      };

      try {
        const response = await fetch('/api/startups', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newStartup)
        });
        if(response.ok) {
          window.location.href = 'startups.html';
        } else {
          alert('Failed to submit');
        }
      } catch(err) {
        console.error(err);
        alert('Error connecting to backend');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
